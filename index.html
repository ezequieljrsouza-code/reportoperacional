<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Operacional - Passagem de Turno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        select, input, textarea { cursor: pointer; transition: border-color 0.2s; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
        .progress-bar { transition: width 0.4s ease; }
        .pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px; }
        .pill-ok   { background: #dcfce7; color: #166534; }
        .pill-warn { background: #fef9c3; color: #854d0e; }
        .pill-err  { background: #fee2e2; color: #991b1b; }
        .btn-active { transform: scale(0.97); }
        .copy-feedback { opacity: 0; transition: opacity 0.3s; font-size: 11px; }
        .copy-feedback.show { opacity: 1; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

<div class="max-w-2xl mx-auto px-4 py-6">

    <!-- Header -->
    <header class="text-center mb-6">
        <h1 class="text-2xl font-extrabold text-slate-800">📋 Checklist Operacional</h1>
        <p class="text-slate-400 text-xs mt-1">Analista: Ezequiel Miranda &nbsp;|&nbsp; <span id="ts" class="tabular-nums"></span></p>
    </header>

    <div class="space-y-4">

        <!-- Informações Gerais -->
        <section class="bg-white rounded-xl p-5 card border-t-4 border-slate-700">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4">Informações Gerais</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="text-[11px] text-slate-500 mb-1 block">Responsável</label>
                    <input id="responsible" value="Gestor" oninput="updateAll()" class="border rounded-lg p-2 bg-slate-50 text-sm w-full">
                </div>
                <div>
                    <label class="text-[11px] text-slate-500 mb-1 block">Jornada</label>
                    <input id="journey" value="12:00 → 20:20" oninput="updateAll()" class="border rounded-lg p-2 bg-slate-50 text-sm w-full">
                </div>
                <div class="md:col-span-2">
                    <label class="text-[11px] text-slate-500 mb-1 block">Título da Passagem</label>
                    <input id="handoffTitle" value="Passagem de Turno T2 → T3" oninput="updateAll()" class="border rounded-lg p-2 bg-slate-50 text-sm font-bold w-full">
                </div>
            </div>
        </section>

        <!-- Status das Rotas -->
        <section class="bg-white rounded-xl p-5 card border-t-4 border-blue-500">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-blue-500 mb-4">Status das Rotas</h2>
            <div id="routesContainer" class="space-y-2"></div>
            <div id="routeSummary" class="flex gap-2 flex-wrap mt-3"></div>
        </section>

        <!-- Checklist Operacional -->
        <section class="bg-white rounded-xl p-5 card border-t-4 border-emerald-500">
            <div class="flex items-center justify-between mb-1">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-emerald-500">Checklist Operacional</h2>
                <span id="checkProgress" class="text-xs font-semibold text-slate-500">0 / 8</span>
            </div>
            <div class="bg-slate-100 rounded-full h-1.5 mb-4 overflow-hidden">
                <div id="progressBar" class="progress-bar bg-emerald-500 h-1.5 rounded-full" style="width:0%"></div>
            </div>
            <div id="checklistContainer" class="space-y-1"></div>
        </section>

        <!-- Observações -->
        <section class="bg-white rounded-xl p-5 card border-t-4 border-amber-400">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-amber-500 mb-4">Observações</h2>
            <div class="mb-3">
                <label class="text-[11px] text-slate-500 mb-1 block">T1 → T2</label>
                <textarea id="obsT1T2" oninput="updateAll()" placeholder="Notas da passagem anterior..." class="w-full border rounded-lg p-2 h-16 bg-slate-50 text-sm resize-none"></textarea>
            </div>
            <div>
                <label class="text-[11px] text-slate-500 mb-1 block">T2 → T3</label>
                <textarea id="obsT2T3" oninput="updateAll()" placeholder="Notas para o próximo turno..." class="w-full border rounded-lg p-2 h-16 bg-slate-50 text-sm resize-none"></textarea>
            </div>
        </section>

        <!-- Botões -->
        <div class="grid grid-cols-3 gap-3">
            <button onclick="resetAll()" class="bg-white border border-slate-300 text-slate-700 font-bold py-3 rounded-xl text-sm active:scale-95 transition-all hover:bg-slate-50">↺ Limpar</button>
            <button onclick="copyReport()" class="bg-blue-600 text-white font-bold py-3 rounded-xl text-sm active:scale-95 transition-all hover:bg-blue-700 flex items-center justify-center gap-1">
                ⎘ Copiar <span id="copyFeedback" class="copy-feedback text-blue-200">✓</span>
            </button>
            <button onclick="openWhatsApp()" class="bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm active:scale-95 transition-all hover:bg-emerald-700">📱 WhatsApp</button>
        </div>

        <!-- Prévia -->
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Prévia do Relatório</label>
            <pre id="preview" class="mt-2 p-4 bg-white rounded-xl border text-[12px] text-slate-700 whitespace-pre-wrap font-mono card max-h-80 overflow-y-auto"></pre>
        </div>

    </div>
</div>

<script>
const routeData = [
    {code:"EPA4", time:"11:00–13:00"},
    {code:"EPA5", time:"12:00–14:00"},
    {code:"ETO4", time:"13:00–15:30"},
    {code:"EPA7", time:"13:00–15:30"},
    {code:"EPA3", time:"14:00–16:30"},
    {code:"EPA8", time:"14:00–16:30"}
];

const checklistData = [
    {icon:"🔄", label:"5S da Operação"},
    {icon:"⛓️", label:"Envio do Forms"},
    {icon:"📊", label:"Status Pacotes"},
    {icon:"✉️", label:"QR's Próximo Ciclo AM"},
    {icon:"🪙", label:"Tratativa Devolução XPT"},
    {icon:"🧹", label:"Organização Geral"},
    {icon:"📦", label:"Tratativas Volumoso"},
    {icon:"🏗️", label:"Baixa de MPs"}
];

function renderFields() {
    const rc = document.getElementById('routesContainer');
    routeData.forEach(r => {
        const div = document.createElement('div');
        div.className = "flex items-center gap-3 p-2 bg-slate-50 rounded-lg border border-slate-200";
        div.innerHTML = `
            <span class="text-sm font-bold text-slate-800 min-w-[58px]">🚚 ${r.code}</span>
            <span class="text-[11px] text-slate-400 flex-1 uppercase">${r.time}</span>
            <select class="route-status border rounded-lg p-1.5 text-xs bg-white min-w-[130px]" onchange="updateAll()">
                <option value="OK">✅ OK</option>
                <option value="ATRASADO">🟡 Atrasado</option>
                <option value="CANCELADO">❌ Cancelado</option>
            </select>`;
        rc.appendChild(div);
    });

    const cc = document.getElementById('checklistContainer');
    checklistData.forEach(c => {
        const div = document.createElement('div');
        div.className = "flex items-center justify-between py-2 border-b border-slate-100 last:border-0";
        div.innerHTML = `
            <div class="flex items-center gap-2 text-sm text-slate-700">
                <span class="text-base">${c.icon}</span>
                <span>${c.label}</span>
            </div>
            <select class="check-status border rounded-lg p-1.5 text-xs bg-white min-w-[120px]" onchange="updateAll()">
                <option value="OK">✅ Concluído</option>
                <option value="Parcial">🟡 Parcial</option>
                <option value="Pendente">❌ Pendente</option>
            </select>`;
        cc.appendChild(div);
    });
}

function updateTimestamp() {
    const now = new Date();
    const d = now.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
    const t = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    const el = document.getElementById('ts');
    if(el) el.textContent = d + ' · ' + t;
}

function updateAll() {
    const title    = document.getElementById('handoffTitle').value;
    const resp     = document.getElementById('responsible').value;
    const journey  = document.getElementById('journey').value;

    const routeSelects = document.querySelectorAll('.route-status');
    const checkSelects = document.querySelectorAll('.check-status');

    // Resumo de rotas
    let okCount = 0, warnCount = 0, errCount = 0;
    routeSelects.forEach(s => {
        if(s.value === 'OK') okCount++;
        else if(s.value === 'ATRASADO') warnCount++;
        else errCount++;
    });
    const summary = document.getElementById('routeSummary');
    summary.innerHTML = '';
    if(okCount)   summary.innerHTML += `<span class="pill pill-ok">${okCount} OK</span>`;
    if(warnCount) summary.innerHTML += `<span class="pill pill-warn">${warnCount} atrasado${warnCount>1?'s':''}</span>`;
    if(errCount)  summary.innerHTML += `<span class="pill pill-err">${errCount} cancelado${errCount>1?'s':''}</span>`;

    // Progresso do checklist
    let checkOk = 0;
    checkSelects.forEach(s => { if(s.value === 'OK') checkOk++; });
    const total = checklistData.length;
    document.getElementById('checkProgress').textContent = checkOk + ' / ' + total;
    document.getElementById('progressBar').style.width = Math.round((checkOk / total) * 100) + '%';

    // Gerar texto do relatório
    const now = new Date();
    const dateStr = now.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
    const timeStr = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    const sep = '─'.repeat(30);

    let text = `*${title}*\n`;
    text += `📅 ${dateStr}  🕒 ${timeStr}\n`;
    text += `👤 *Resp:* ${resp}  |  🕑 *Jornada:* ${journey}\n`;
    text += sep + '\n';
    text += `*STATUS DAS ROTAS XPT:*\n`;
    routeData.forEach((r, i) => {
        const v = routeSelects[i] ? routeSelects[i].value : 'OK';
        const icon = v === 'OK' ? '✅' : v === 'ATRASADO' ? '🟡' : '❌';
        text += `🚚 *${r.code}* (${r.time}): ${icon} ${v}\n`;
    });
    text += sep + '\n';
    text += `*CHECKLIST OPERACIONAL (${checkOk}/${total}):*\n`;
    checklistData.forEach((c, i) => {
        const v = checkSelects[i] ? checkSelects[i].value : 'OK';
        const icon = v === 'OK' ? '✅' : v === 'Parcial' ? '🟡' : '❌';
        text += `${c.icon} ${c.label}: ${icon} *${v}*\n`;
    });

    const t1 = document.getElementById('obsT1T2').value.trim();
    const t2 = document.getElementById('obsT2T3').value.trim();
    if(t1 || t2) {
        text += sep + '\n';
        text += `*OBSERVAÇÕES:*\n`;
        if(t1) text += `📌 *T1 > T2:* ${t1}\n`;
        if(t2) text += `📌 *T2 > T3:* ${t2}\n`;
    }

    document.getElementById('preview').textContent = text;
    return text;
}

async function copyReport() {
    const text = updateAll();
    try {
        await navigator.clipboard.writeText(text);
    } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }
    const fb = document.getElementById('copyFeedback');
    fb.classList.add('show');
    setTimeout(() => fb.classList.remove('show'), 2000);
}

function openWhatsApp() {
    const text = updateAll();
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function resetAll() {
    document.getElementById('responsible').value = 'Gestor';
    document.getElementById('journey').value = '12:00 → 20:20';
    document.getElementById('handoffTitle').value = 'Passagem de Turno T2 → T3';
    document.getElementById('obsT1T2').value = '';
    document.getElementById('obsT2T3').value = '';
    document.querySelectorAll('.route-status').forEach(s => s.value = 'OK');
    document.querySelectorAll('.check-status').forEach(s => s.value = 'OK');
    updateAll();
}

document.addEventListener('DOMContentLoaded', () => {
    renderFields();
    updateTimestamp();
    updateAll();
    setInterval(updateTimestamp, 60000);
});
</script>
</body>
</html>
